name: Check Pending Updates

on:
  schedule:
    # 每天北京时间 10:00 (UTC 2:00) 检查一次
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.compare.outputs.has_updates }}
      deployed_sha: ${{ steps.deployed.outputs.sha }}
      latest_sha: ${{ steps.latest.outputs.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Tags
        run: git fetch --tags origin

      - name: Get Last Deployed Commit
        id: deployed
        run: |
          TAG="deployed-production"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            SHA=$(git rev-parse "$TAG")
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            echo "Last deployed: $SHA"
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
            echo "No previous deployment tag found."
          fi

      - name: Get Latest Main Commit
        id: latest
        run: |
          SHA=$(git rev-parse origin/main)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Latest on main: $SHA"

      - name: Compare
        id: compare
        run: |
          DEPLOYED="${{ steps.deployed.outputs.sha }}"
          LATEST="${{ steps.latest.outputs.sha }}"

          if [ -z "$DEPLOYED" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No previous deployment found. All commits are pending."
            exit 0
          fi

          if [ "$DEPLOYED" = "$LATEST" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "✅ Server is up to date with main."
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "## Pending Changes (not yet deployed)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            git log --oneline "$DEPLOYED..$LATEST" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ **$(git rev-list --count "$DEPLOYED..$LATEST") commits** waiting to be deployed." >> "$GITHUB_STEP_SUMMARY"
            echo "Trigger the [CD workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/cd.yml) to deploy." >> "$GITHUB_STEP_SUMMARY"
          fi
