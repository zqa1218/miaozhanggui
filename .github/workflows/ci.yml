name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      # ---- Install ----

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      # ---- Lint & Type Check ----

      - name: Lint (Root Backend)
        run: |
          if compgen -G ".eslintrc*" > /dev/null || compgen -G "eslint.config.*" > /dev/null; then
            npx eslint . --ext .js,.ts
          else
            echo "No ESLint config found — skipping lint"
          fi

      - name: Lint (Frontend)
        working-directory: frontend
        run: |
          if compgen -G ".eslintrc*" > /dev/null || compgen -G "eslint.config.*" > /dev/null; then
            npx eslint . --ext .js,.ts,.vue
          else
            echo "No ESLint config found — skipping lint"
          fi

      - name: TypeScript Check (Root)
        run: |
          if compgen -G "tsconfig*.json" > /dev/null; then
            npx tsc --noEmit
          else
            echo "No tsconfig found — skipping type check"
          fi

      - name: TypeScript Check (Frontend)
        working-directory: frontend
        run: |
          if compgen -G "tsconfig*.json" > /dev/null; then
            npx vue-tsc --noEmit 2>/dev/null || npx tsc --noEmit
          else
            echo "No tsconfig found — skipping type check"
          fi

      # ---- Build ----

      - name: Build Frontend
        run: npm run build
        working-directory: frontend

      - name: Verify Backend Loads
        run: |
          node -e '
          try {
            require("./src/server.js");
            console.log("Backend entry module loaded successfully.");
          } catch (e) {
            if (e instanceof SyntaxError) {
              console.error("SYNTAX ERROR:", e.message);
              process.exit(1);
            }
            if (e.code === "MODULE_NOT_FOUND") {
              console.log("Missing module (OK in CI):", e.message.split("\n")[0]);
            } else {
              console.log("Backend loaded (non-syntax error ignored in CI):", String(e.message).slice(0, 120));
            }
          }
          '
